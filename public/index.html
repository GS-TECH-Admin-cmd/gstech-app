<!doctype html><html lang="ko"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>GS-TECH Attendance</title><style>:root{--blue:#113462;--red:#c6152d;--gold:#c59a48;--bg:#f5f7fb;--card:#fff;--shadow:0 10px 24px rgba(17,52,98,.14)}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial}header{display:flex;gap:14px;align-items:center;padding:12px 16px;background:linear-gradient(90deg,rgba(198,21,45,.95),rgba(17,52,98,.95));color:#fff}header img{height:44px;pointer-events:none;user-select:none}header .title{margin:0;font-weight:800;font-size:15px}header .subtitle{margin:2px 0 0;font-size:12px;opacity:.85}header .grow{flex:1}.chip{background:rgba(255,255,255,.16);padding:6px 10px;border-radius:999px;font-size:12px}.btn{cursor:pointer;border:0;border-radius:10px;font-weight:800;padding:10px 12px}.btn.primary{background:#fff;color:var(--blue)}.btn.danger{background:#fff;color:var(--red)}.btn.ghost{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.5)}.container{max-width:1080px;margin:18px auto;padding:0 16px}.grid{display:grid;gap:14px;grid-template-columns:1fr}@media (min-width:920px){.grid{grid-template-columns:1fr 1fr}}.card{background:var(--card);border-radius:14px;box-shadow:var(--shadow);padding:16px}.card h2{margin:0 0 8px;font-size:14px}.row{display:flex;gap:10px;flex-wrap:wrap}.field{flex:1;min-width:140px}label{display:block;font-size:12px;color:#475569;margin-bottom:6px}input,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid #e2e8f0}.pill{display:inline-flex;align-items:center;justify-content:center;padding:6px 10px;border-radius:999px;font-weight:800;font-size:12px;color:#fff}.pill.blue{background:var(--blue)}.pill.red{background:var(--red)}.pill.gold{background:var(--gold)}.list{margin:12px 0 0;padding:0;list-style:none;display:grid;gap:10px}.li{border:1px solid #e2e8f0;border-radius:12px;padding:12px}.status{margin-left:8px;font-size:12px;opacity:.85}.meta{margin-top:8px;font-size:12px;color:#64748b}.toast{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);background:rgba(17,52,98,.95);color:#fff;padding:10px 12px;border-radius:999px;box-shadow:0 18px 44px rgba(0,0,0,.22);opacity:0;pointer-events:none;transition:opacity .2s}.toast.show{opacity:1}.help{margin:12px 0 0;color:#64748b;font-size:12px;line-height:1.4}</style></head><body><header><img src="logo1.png" alt="GS-TECH America LLC"><div class="grow"><p class="title">GS-TECH Attendance</p><p class="subtitle">현장 출퇴근 + 리포트 + 관리자 승인</p></div><div class="chip" id="chip-status">로그아웃</div><button class="btn ghost" id="logout" style="display:none">로그아웃</button></header><div class="container"><div class="grid"><section class="card"><h2>로그인</h2><div class="row"><div class="field"><label>이메일</label><input id="email" placeholder="email"/></div><div class="field"><label>비밀번호</label><input id="password" placeholder="password" type="password" autocomplete="current-password"/></div></div><div class="row"><button class="btn primary" id="signup">회원가입</button><button class="btn primary" id="login">로그인</button></div><p class="help">관리자 계정은 등록된 관리자 이메일로 로그인하면 자동으로 관리자 화면이 열립니다.</p></section><section class="card" id="summary" style="display:none"><h2>오늘 상태</h2><div class="row"><div class="pill blue" id="pill-role">-</div><div class="pill red" id="pill-today">-</div></div></section><section class="card" id="employee" style="display:none"><h2>직원</h2><div class="row"><div class="field"><label>근로자</label><input id="worker"/></div><div class="field"><label>현장</label><input id="site"/></div><div class="field"><label>팀/크루</label><input id="crew"/></div></div><div class="row"><button class="btn primary" id="checkin">출근</button><button class="btn primary" id="checkout">퇴근</button></div><div class="field" style="flex-basis:100%;margin-top:8px"><label>데일리 리포트</label><textarea id="notes" rows="4" placeholder="오늘 작업 내용을 입력하세요"></textarea></div><div class="row"><button class="btn primary" id="report">리포트 제출</button></div></section><section class="card" id="manager" style="display:none"><h2>관리자</h2><div class="row"><button class="btn primary" id="load">승인 대기 불러오기</button></div><ul id="list" class="list"></ul></section></div></div><div class="toast" id="toast"></div><script type="module">import { createClient } from "https://esm.sh/@supabase/supabase-js@2.45.0";const MANAGERS=["oh82@gstechamericallc.com","syl@gstechamericallc.com"];const supabase=createClient("https://ktkaaksftkihokgaxqtr.supabase.co","eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt0a2Fha3NmdGtpaG9rZ2F4cXRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNzQ2NjYsImV4cCI6MjA5MTg1MDY2Nn0.WFMQOvyQF8eWA4aMik-NHBxKPlA_Dmv41fsPtXTQAks");const q=(id)=>document.getElementById(id);const toast=(msg)=>{const t=q("toast");t.textContent=msg;t.className="toast show";setTimeout(()=>{t.className="toast"},1800)};const safe=(id)=>(q(id)?.value||"").trim();async function render(){const {data:{user}}=await supabase.auth.getUser();q("logout").style.display=user?"block":"none";if(!user){q("chip-status").textContent="로그아웃";q("summary").style.display="none";q("employee").style.display="none";q("manager").style.display="none";return;}const isManager=MANAGERS.includes(user.email);q("chip-status").textContent=isManager?"관리자":"직원";q("summary").style.display="block";q("employee").style.display="block";q("manager").style.display=isManager?"block":"none";q("pill-role").textContent=isManager?"관리자":"직원";q("pill-role").className="pill "+(isManager?"blue":"gold");const {data}=await supabase.from("attendance_logs").select("id,check_out_time,status").eq("created_by",user.email).order("check_in_time",{ascending:false}).limit(1);const row=data&&data[0];let pill="-";if(!row)pill="출근 기록 없음";else if(!row.check_out_time)pill="출근중";else if(row.status==="approved")pill="승인됨";else if(row.status==="rejected")pill="반려됨";else pill="퇴근 저장";q("pill-today").textContent=pill;q("pill-today").className="pill "+(pill==="출근중"?"blue":"red")}q("signup").onclick=async()=>{try{const {error}=await supabase.auth.signUp({email:safe("email"),password:safe("password")});if(error)throw error;toast("가입 메일 확인해 주세요")}catch(e){toast("가입 실패")}};q("login").onclick=async()=>{try{const {error}=await supabase.auth.signInWithPassword({email:safe("email"),password:safe("password")});if(error)throw error;toast("로그인");render()}catch(e){toast("로그인 실패")}};q("logout").onclick=async()=>{await supabase.auth.signOut();render();toast("로그아웃")};q("checkin").onclick=async()=>{try{const {data:{user}}=await supabase.auth.getUser();if(!user)throw new Error("no user");await supabase.from("attendance_logs").insert({created_by:user.email,worker_name:safe("worker"),site_name:safe("site"),crew_name:safe("crew"),check_in_time:new Date().toISOString(),status:"pending"});toast("출근 저장");render()}catch(e){toast("출근 실패")}};q("checkout").onclick=async()=>{try{const {data:{user}}=await supabase.auth.getUser();if(!user)throw new Error("no user");const {data}=await supabase.from("attendance_logs").select("id,check_out_time").eq("created_by",user.email).is("check_out_time",null).order("check_in_time",{ascending:false}).limit(1);const row=data&&data[0];if(!row){toast("출근중 기록 없음");return;}await supabase.from("attendance_logs").update({check_out_time:new Date().toISOString()}).eq("id",row.id);toast("퇴근 저장");render()}catch(e){toast("퇴근 실패")}};q("report").onclick=async()=>{try{const {data:{user}}=await supabase.auth.getUser();if(!user)throw new Error("no user");await supabase.from("daily_reports").insert({created_by:user.email,worker_name:safe("worker"),site_name:safe("site"),crew_name:safe("crew"),notes:safe("notes"),status:"pending"});toast("리포트 제출");render()}catch(e){toast("리포트 실패")}};q("load").onclick=async()=>{try{const {data:{user}}=await supabase.auth.getUser();if(!user||!MANAGERS.includes(user.email)){toast("관리자만");return;}q("list").innerHTML="";const {data:logs}=await supabase.from("attendance_logs").select("id,worker_name,site_name,status,check_in_time").eq("status","pending");const {data:reports}=await supabase.from("daily_reports").select("id,worker_name,site_name,status,notes,created_at").eq("status","pending");const make=(kind,arr)=>(arr||[]).forEach(r=>{const li=document.createElement("li");li.className="li";li.innerHTML=`<b>${kind}</b> · ${r.worker_name}(${r.site_name}) <span class="status ${r.status}">${r.status}</span><div class="row"><button class="btn primary approve">승인</button><button class="btn danger reject">반려</button></div><div class="meta">ID: ${r.id}</div>`;const approve=li.querySelector(".approve");const reject=li.querySelector(".reject");approve.onclick=async()=>{await supabase.from(kind==="로그"?"attendance_logs":"daily_reports").update({status:"approved"}).eq("id",r.id);li.remove();toast("승인")};reject.onclick=async()=>{await supabase.from(kind==="로그"?"attendance_logs":"daily_reports").update({status:"rejected"}).eq("id",r.id);li.remove();toast("반려")};q("list").appendChild(li)});make("로그",logs);make("리포트",reports);if(!q("list").childElementCount)q("list").innerHTML="<li class='li'>승인 대기 없음</li>"}catch(e){toast("불러오기 실패")}};supabase.auth.onAuthStateChange(()=>render());render();</script></body></html>
