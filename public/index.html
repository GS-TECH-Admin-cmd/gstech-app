<!doctype html><html><head><meta charset=utf-8><meta name=viewport content=width=device-width,initial-scale=1><title>GS-TECH Attendance</title></head><body><div id=app>GS-TECH Attendance</div><script type=module>const U='https://ktkaaksftkihokgaxqtr.supabase.co',K='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt0a2Fha3NmdGtpaG9rZ2F4cXRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNzQ2NjYsImV4cCI6MjA5MTg1MDY2Nn0.WFMQOvyQF8eWA4aMik-NHBxKPlA_Dmv41fsPtXTQAks',ADMIN='GS-TECH-ADMIN2026';import{createClient}from"https://esm.sh/@supabase/supabase-js@2";const s=createClient(U,K);const g=(x)=>document.getElementById(x);const app=g('app');app.innerHTML=`<div id=a><h2>Auth</h2><input id=em placeholder=email><input id=p type=password placeholder=password><input id=ac placeholder='관리자코드(관리자만)'/><button id=up>회원가입</button><button id=in>로그인</button><button id=out>로그아웃</button><div id=who></div></div><div id=e style=display:none><h2>직원</h2><input id=n placeholder=이름><input id=si placeholder=현장명><input id=c placeholder=Crew><button id=ci>출근</button><button id=co>퇴근</button><textarea id=nt placeholder='데일리리포트'></textarea><button id=sr>리포트 제출</button><div id=msg></div></div><div id=m style=display:none><h2>관리자</h2><button id=load>대기/리포트 불러오기</button><div id=logs></div><div id=reports></div></div>`;const info=async()=>{const {data:{session}}=await s.auth.getSession();if(!session){g('who').innerHTML='로그인 없음';g('e').style.display=g('m').style.display='none';return null;}const r=session.user.user_metadata?.role||'employee';g('who').innerHTML=session.user.email+' ('+r+')';g('e').style.display='block';g('m').style.display=r==='manager'?'block':'none';return{session,role:r}};g('up').onclick=async()=>{const email=g('em').value.trim(),password=g('p').value;const ac=g('ac').value.trim();const role=ac===ADMIN?'manager':'employee';const {error}=await s.auth.signUp({email,password,options:{data:{role}}});g('msg').innerText=error?error.message:'가입 완료(메일 인증 필요할 수 있음)';};g('in').onclick=async()=>{const email=g('em').value.trim(),password=g('p').value;const {error}=await s.auth.signInWithPassword({email,password});g('msg').innerText=error?error.message:'로그인 성공';await info();};g('out').onclick=async()=>{await s.auth.signOut();g('msg').innerText='로그아웃';await info();};g('ci').onclick=async()=>{const o=await info();if(!o)return;const user_id=o.session.user.id;const worker_name=g('n').value.trim(),site_name=g('si').value.trim(),crew_name=g('c').value.trim();if(!worker_name||!site_name||!crew_name)return g('msg').innerText='필수값 입력';const {error}=await s.from('attendance_logs').insert({user_id,worker_name,site_name,crew_name,check_in_time:new Date().toISOString(),status:'pending'});g('msg').innerText=error?error.message:'출근 기록 저장';};g('co').onclick=async()=>{const o=await info();if(!o)return;const user_id=o.session.user.id;const {data,error}=await s.from('attendance_logs').update({check_out_time:new Date().toISOString()}).eq('user_id',user_id).is('check_out_time',null).order('check_in_time',{ascending:false}).limit(1).select();g('msg').innerText=error?'퇴근 실패':(data?.length?'퇴근 기록 저장':'대기중인 출근 기록 없음');};g('sr').onclick=async()=>{const o=await info();if(!o)return;const user_id=o.session.user.id;const worker_name=g('n').value.trim(),site_name=g('si').value.trim(),crew_name=g('c').value.trim(),notes=g('nt').value.trim();if(!worker_name||!site_name||!crew_name||!notes)return g('msg').innerText='필수값 입력';const {error}=await s.from('daily_reports').insert({user_id,worker_name,site_name,crew_name,notes,status:'pending'});g('msg').innerText=error?error.message:'리포트 제출 완료';g('nt').value='';};const renderList=(el,rows,isLog)=>{const html=rows.map(r=>`<div style="border:1px solid #ccc;margin:8px;padding:6px">${isLog?`[출퇴근] ${r.worker_name} ${r.site_name} ${r.crew_name}`:`[리포트] ${r.worker_name}`}<br>${isLog?`${r.check_in_time} ~ ${r.check_out_time||''}`:`${r.notes}`}<br>${isLog?'출근':'작성'} status:${r.status}<br><button data-id="${r.id}" data-table="${isLog?'attendance_logs':'daily_reports'}" data-status="approved">승인</button> <button data-id="${r.id}" data-table="${isLog?'attendance_logs':'daily_reports'}" data-status="rejected">반려</button></div>`).join('');g(el).innerHTML=html||'없음';g(el).querySelectorAll('button[data-id]').forEach(b=>b.onclick=async()=>{const t=b.dataset.table,id=b.dataset.id,status=b.dataset.status;const {error}=await s.from(t).update({status}).eq('id',id);if(error)g('msg').innerText=error.message;else {g('msg').innerText='처리 완료';await load();}});};const load=async()=>{const o=await info();if(!o||o.role!=='manager')return;const {data:logs,error:lerr}=await s.from('attendance_logs').select().order('check_in_time',{ascending:false}).limit(30);const {data:reports,error:perr}=await s.from('daily_reports').select().order('created_at',{ascending:false}).limit(30);if(lerr||perr){g('msg').innerText=(lerr||perr).message;return;}renderList('logs',logs,true);renderList('reports',reports,false);};g('load').onclick=load;info();</script></body></html>
