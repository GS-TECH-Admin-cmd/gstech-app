<!doctype html><html lang="ko"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>GS-TECH Attendance</title><style>:root{--red:#d24a3b;--blue:#1e4fd3;--gray:#444;--bg:#f5f6fa;--card:rgba(255,255,255,0.85);--border:rgba(0,0,0,0.10)}html,body{height:100%}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:linear-gradient(180deg,#0b0f1a 0%,#0b0f1a 220px,#f5f6fa 220px);color:#111}header{position:sticky;top:0;z-index:10;background:linear-gradient(90deg,var(--red),var(--blue));padding:12px 16px;box-shadow:0 8px 18px rgba(0,0,0,.25)}.bar{max-width:980px;margin:0 auto;display:flex;align-items:center;gap:12px;justify-content:space-between}.brand{display:flex;align-items:center;gap:10px}.brand img{height:26px;width:auto}.brand .text{display:flex;flex-direction:column;line-height:1}.brand .name{font-weight:800;color:#fff;letter-spacing:.3px}.brand .sub{font-size:12px;color:rgba(255,255,255,.86)}nav{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}.pill{border:1px solid rgba(255,255,255,.35);background:rgba(255,255,255,.12);color:#fff;border-radius:999px;padding:7px 11px;font-size:12px;cursor:pointer} .pill:hover{background:rgba(255,255,255,.18)}.pill.active{background:rgba(255,255,255,.26);border-color:rgba(255,255,255,.55)}.pill:disabled{opacity:.4;cursor:not-allowed}main{max-width:980px;margin:16px auto;padding:0 16px 40px}.grid{display:grid;grid-template-columns:1fr;gap:14px}@media (min-width:900px){.grid{grid-template-columns:1fr 1fr}}.card{background:var(--card);backdrop-filter:blur(8px);border-radius:14px;border:1px solid var(--border);box-shadow:0 10px 24px rgba(0,0,0,.12);padding:14px 14px}.card h2{margin:0 0 10px;font-size:14px;color:#1d1d1f;display:flex;align-items:center;gap:8px}.badge{font-size:11px;padding:3px 8px;border-radius:999px;border:1px solid var(--border);color:#333;background:#fff}.muted{color:#666;font-size:12px}.row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}.row input,.row textarea,.row select{border:1px solid rgba(0,0,0,.12);border-radius:9px;padding:8px 10px;font-size:14px;outline:none;background:#fff;min-width:0}textarea{min-height:88px;width:100%;resize:vertical;line-height:1.35}input{width:100%} .row input.small{width:160px}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}.btn{border:1px solid rgba(0,0,0,.12);background:#fff;border-radius:9px;padding:9px 12px;cursor:pointer;font-size:13px;color:#1d1d1f}.btn:hover{transform:translateY(-1px)}.primary{border-color:var(--blue);background:rgba(30,79,211,0.08);color:var(--blue)}.danger{border-color:var(--red);background:rgba(210,74,59,0.08);color:var(--red)}.secondary{background:rgba(0,0,0,.03)}.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}.hidden{display:none}.list{display:flex;flex-direction:column;gap:10px;margin-top:12px}.item{border:1px solid var(--border);border-radius:12px;background:#fff;padding:10px}.item .top{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:13px}.item .meta{display:flex;gap:8px;flex-wrap:wrap;color:#666;font-size:12px}.item .body{margin-top:8px;font-size:13px;color:#333}.item .footer{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);max-width:820px;width:calc(100% - 32px);padding:10px 12px;border-radius:12px;background:#fff;border:1px solid var(--border);box-shadow:0 18px 40px rgba(0,0,0,.15);display:none}.toast.ok{border-color:rgba(16,185,129,.25);background:rgba(16,185,129,.06)}.toast.err{border-color:rgba(210,74,59,.25);background:rgba(210,74,59,.06)}.toast strong{display:block;font-size:13px;color:#111}.toast span{display:block;font-size:12px;color:#555;margin-top:2px}</style></head><body><header><div class="bar"><div class="brand"><img src="logo1.png" alt="GS-TECH"/><div class="text"><div class="name">GS-TECH Attendance</div><div class="sub">현장 출근 · 리포트 · 승인</div></div></div><nav><button class="pill active" id="langKo">한국어</button><button class="pill" id="langEn">EN</button><button class="pill" id="langEs">ES</button><button class="pill" id="modeEmployee" disabled>직원</button><button class="pill" id="modeManager" disabled>관리자</button><button class="pill" id="logoutBtn" disabled>로그아웃</button></nav></div></header><main><section class="card hidden" id="summaryCard"><h2>오늘 상태 <span class="badge" id="statusBadge">-</span></h2><div class="muted" id="summaryInfo">로그인 후 자동으로 메인 화면으로 전환됩니다.</div><div class="actions"><button class="btn secondary" id="refreshBtn">새로고침</button><button class="btn" id="csvBtn">CSV 다운로드</button></div></section><section class="card" id="authCard"><h2>로그인/가입</h2><div class="row"><button class="pill active" id="tabLogin">로그인</button><button class="pill" id="tabSignup">회원가입</button></div><div class="row" style="margin-top:10px"><input id="email" type="email" placeholder="이메일"/><input id="password" type="password" placeholder="비밀번호"/></div><div class="actions"><button class="btn primary" id="authSubmit">로그인</button></div><div class="muted" style="margin-top:10px">관리자는 이메일로 자동 구분됩니다.</div></section><section class="grid"><section class="card hidden" id="employeeCard"><h2>직원 출근/퇴근</h2><div class="row"><input class="small" id="worker" placeholder="이름"/><input class="small" id="site" placeholder="현장"/><input class="small" id="crew" placeholder="팀"/></div><div class="row" style="margin-top:10px"><input id="gps" placeholder="GPS" readonly/></div><div class="actions"><button class="btn primary" id="checkInBtn">출근</button><button class="btn" id="checkOutBtn">퇴근</button></div><hr style="margin:16px 0;border:none;border-top:1px solid rgba(0,0,0,.08)"/><h2>데일리 리포트 제출</h2><textarea id="report" placeholder="오늘 작업 내용/이슈"></textarea><div class="actions"><button class="btn primary" id="reportBtn">리포트 제출</button></div></section><section class="card hidden" id="adminCard"><h2>관리자 승인 대기</h2><div class="row"><button class="pill active" id="tabLogs">출퇴근</button><button class="pill" id="tabReports">리포트</button></div><div class="list" id="adminList"></div><div class="muted" id="adminEmpty" style="margin-top:10px">승인 대기가 없습니다.</div></section></section></main><div class="toast" id="toast"><strong></strong><span></span></div><script type="module">import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';const SUPABASE_URL='https://ktkaaksftkihokgaxqtr.supabase.co';const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt0a2Fha3NmdGtpaG9rZ2F4cXRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNzQ2NjYsImV4cCI6MjA5MTg1MDY2Nn0.WFMQOvyQF8eWA4aMik-NHBxKPlA_Dmv41fsPtXTQAks';const MANAGERS=['oh82@gstechamericallc.com','syl@gstechamericallc.com'];const supabase=createClient(SUPABASE_URL,SUPABASE_ANON_KEY,{auth:{detectSessionInUrl:false}});const qs=id=>document.getElementById(id);const toast=qs('toast');let authTab='login';let adminTab='logs';let state={session:null,role:'employee',mode:'employee'};const t=key=>{const d={ko:{login:'로그인',signup:'회원가입',success:'로그인되었습니다'},en:{login:'Login',signup:'Sign up',success:'Signed in'},es:{login:'Iniciar sesión',signup:'Registrarse',success:'Sesión iniciada'}};return d[lang][key]};let lang='ko';qs('langKo').onclick=()=>setLang('ko');qs('langEn').onclick=()=>setLang('en');qs('langEs').onclick=()=>setLang('es');function setLang(x){lang=x;[qs('langKo'),qs('langEn'),qs('langEs')].forEach(btn=>btn.classList.toggle('active',btn.id==='lang'+x.toUpperCase()));render();}qs('tabLogin').onclick=()=>setAuthTab('login');qs('tabSignup').onclick=()=>setAuthTab('signup');function setAuthTab(tab){authTab=tab;qs('tabLogin').classList.toggle('active',tab==='login');qs('tabSignup').classList.toggle('active',tab==='signup');qs('authSubmit').textContent=tab==='login'?t('login'):t('signup');}qs('modeEmployee').onclick=()=>setMode('employee');qs('modeManager').onclick=()=>setMode('manager');qs('logoutBtn').onclick=logout;qs('refreshBtn').onclick=refresh;qs('csvBtn').onclick=downloadCsv;qs('authSubmit').onclick=authSubmit;qs('checkInBtn').onclick=checkIn;qs('checkOutBtn').onclick=checkOut;qs('reportBtn').onclick=submitReport;qs('tabLogs').onclick=()=>setAdminTab('logs');qs('tabReports').onclick=()=>setAdminTab('reports');function showToast(msg,kind='ok',detail=''){toast.className='toast '+kind;toast.querySelector('strong').textContent=msg;toast.querySelector('span').textContent=detail;toast.style.display='block';setTimeout(()=>toast.style.display='none',3200);}function roleFromEmail(email){return MANAGERS.includes(email||'')?'manager':'employee'}function setMode(mode){state.mode=mode;qs('modeEmployee').classList.toggle('active',mode==='employee');qs('modeManager').classList.toggle('active',mode==='manager');render();}function setAdminTab(tab){adminTab=tab;qs('tabLogs').classList.toggle('active',tab==='logs');qs('tabReports').classList.toggle('active',tab==='reports');renderAdmin();}function render(){const loggedIn=!!state.session;qs('authCard').classList.toggle('hidden',loggedIn);qs('summaryCard').classList.toggle('hidden',!loggedIn);qs('logoutBtn').disabled=!loggedIn;qs('modeEmployee').disabled=!loggedIn;qs('modeManager').disabled=!loggedIn || state.role!=='manager';qs('modeManager').classList.toggle('hidden',state.role!=='manager');qs('employeeCard').classList.toggle('hidden',!loggedIn || (state.mode!=='employee' && state.role!=='manager'));qs('adminCard').classList.toggle('hidden',!loggedIn || state.role!=='manager' || state.mode!=='manager');if(loggedIn){qs('summaryInfo').textContent=`${state.session.user.email} / ${state.role}`;qs('statusBadge').textContent='로그인';qs('csvBtn').disabled=false;qs('refreshBtn').disabled=false;loadGps();if(state.role==='manager') loadAdmin();loadLatest();}else{qs('summaryInfo').textContent='로그인 후 자동 전환됩니다.';qs('statusBadge').textContent='-';qs('csvBtn').disabled=true;qs('refreshBtn').disabled=true;}}async function loadLatest(){try{const uid=state.session?.user?.id;if(!uid) return;const {data:rows,error}=await supabase.from('attendance_logs').select('*').eq('user_id',uid).order('check_in_time',{ascending:false}).limit(1);if(error) return;const latest=rows?.[0];if(latest && !latest.check_out_time){qs('statusBadge').textContent='출근중';qs('statusBadge').classList.remove('danger');}else if(latest){qs('statusBadge').textContent='퇴근';}else{qs('statusBadge').textContent='-';}}catch(e){}}function loadGps(){if(!navigator.geolocation) return;navigator.geolocation.getCurrentPosition(pos=>{qs('gps').value=`${pos.coords.latitude.toFixed(6)}, ${pos.coords.longitude.toFixed(6)}`;});}async function authSubmit(){const email=qs('email').value.trim();const password=qs('password').value.trim();if(!email||!password){showToast('이메일/비밀번호를 입력하세요','err');return;}try{let session=null;let msg='';if(authTab==='login'){const {data,error}=await supabase.auth.signInWithPassword({email,password});if(error) throw error;session=data.session;msg=t('success');}else{const {data,error}=await supabase.auth.signUp({email,password});if(error) throw error;if(!data.session){showToast('회원가입 완료','ok','이메일 확인 후 로그인해주세요');setAuthTab('login');return;}session=data.session;msg='회원가입 완료';}state.session=session;state.role=roleFromEmail(state.session.user.email);state.mode=state.role;render();showToast(msg,'ok');}catch(err){showToast('오류', 'err', err.message||String(err));}}async function logout(){await supabase.auth.signOut();state={session:null,role:'employee',mode:'employee'};render();showToast('로그아웃','ok');}async function refresh(){if(state.role==='manager') await loadAdmin();await loadLatest();}async function checkIn(){const uid=state.session?.user?.id;const email=state.session?.user?.email;if(!uid){showToast('로그인 필요','err');return;}const worker=qs('worker').value.trim();const site=qs('site').value.trim();const crew=qs('crew').value.trim();const gps=qs('gps').value.trim();if(!worker||!site||!crew){showToast('이름/현장/팀 입력','err');return;}try{const payload={worker_name:worker,site_name:site,crew_name:crew,user_id:uid,notes:gps||null,check_in_time:new Date().toISOString(),status:'pending'};const {error}=await supabase.from('attendance_logs').insert(payload);if(error) throw error;qs('worker').value='';qs('site').value='';qs('crew').value='';qs('gps').value='';showToast('출근 저장','ok');loadLatest();if(state.role==='manager') loadAdmin();}catch(err){showToast('오류','err',err.message||String(err));}}async function checkOut(){const uid=state.session?.user?.id;const email=state.session?.user?.email;if(!uid){showToast('로그인 필요','err');return;}try{const {data:rows,error}=await supabase.from('attendance_logs').select('id').eq('user_id',uid).is('check_out_time',null).order('check_in_time',{ascending:false}).limit(1);if(error) throw error;if(!rows?.length){showToast('출근중인 기록 없음','err');return;}const id=rows[0].id;const {error:e2}=await supabase.from('attendance_logs').update({check_out_time:new Date().toISOString()}).eq('id',id).eq('user_id',uid);if(e2) throw e2;showToast('퇴근 저장','ok');loadLatest();if(state.role==='manager') loadAdmin();}catch(err){showToast('오류','err',err.message||String(err));}}async function submitReport(){const uid=state.session?.user?.id;const email=state.session?.user?.email;if(!uid){showToast('로그인 필요','err');return;}const notes=qs('report').value.trim();if(!notes){showToast('내용 입력','err');return;}try{const {error}=await supabase.from('daily_reports').insert({user_id:uid,worker_name:qs('worker').value.trim()||'-',site_name:qs('site').value.trim()||'-',crew_name:qs('crew').value.trim()||'-',notes,status:'pending'});if(error) throw error;qs('report').value='';showToast('리포트 저장','ok');if(state.role==='manager') loadAdmin();}catch(err){showToast('오류','err',err.message||String(err));}}async function loadAdmin(){try{const {data:logs,error:errLogs}=await supabase.from('attendance_logs').select('*').eq('status','pending').order('check_in_time',{ascending:false}).limit(20);if(errLogs) throw errLogs;const {data:reports,error:errReports}=await supabase.from('daily_reports').select('*').eq('status','pending').order('created_at',{ascending:false}).limit(20);if(errReports) throw errReports;state.admin={logs,reports};renderAdmin();}catch(err){showToast('오류','err',err.message||String(err));}}function renderAdmin(){if(state.role!=='manager') return;const list=qs('adminList');list.innerHTML='';const empty=qs('adminEmpty');const items=adminTab==='logs'?state.admin?.logs||[]:state.admin?.reports||[];if(!items.length){empty.classList.remove('hidden');return;}empty.classList.add('hidden');for(const it of items){const div=document.createElement('div');div.className='item';if(adminTab==='logs'){div.innerHTML=`<div class="top"><strong>${it.worker_name||'-'}</strong><span class="meta">${(it.site_name||'-')} · ${(it.crew_name||'-')}</span></div><div class="meta">출근 ${new Date(it.check_in_time).toLocaleString()}${it.check_out_time? ' · 퇴근 '+new Date(it.check_out_time).toLocaleString():''}</div>`;}else{div.innerHTML=`<div class="top"><strong>${it.worker_name||'-'}</strong><span class="meta">${(it.site_name||'-')} · ${(it.crew_name||'-')}</span></div><div class="meta">${new Date(it.created_at).toLocaleString()}</div><div class="body">${it.notes||''}</div>`;}const footer=document.createElement('div');footer.className='footer';['approved','rejected'].forEach(st=>{const b=document.createElement('button');b.className='btn '+(st==='rejected'?'danger':'primary');b.textContent=st==='approved'?'승인':'반려';b.onclick=()=>updateStatus(adminTab,it.id,st);footer.appendChild(b);});div.appendChild(footer);list.appendChild(div);} }async function updateStatus(kind,id,status){try{const table=kind==='logs'?'attendance_logs':'daily_reports';const {error}=await supabase.from(table).update({status}).eq('id',id);if(error) throw error;showToast(status==='approved'?'승인 완료':'반려 완료','ok');loadAdmin();}catch(err){showToast('오류','err',err.message||String(err));}}async function downloadCsv(){const uid=state.session?.user?.id;if(!uid){showToast('로그인 필요','err');return;}try{const {data, error}=await supabase.from('attendance_logs').select('*').eq('user_id',uid).order('check_in_time',{ascending:false}).limit(2000);if(error) throw error;const headers=['id','worker_name','site_name','crew_name','check_in_time','check_out_time','status'];const rows=data.map(r=>headers.map(h=>JSON.stringify(r[h]??'')).join(','));const csv=headers.join(',')+'\n'+rows.join('\n');const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='attendance.csv';document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);showToast('CSV 다운로드','ok');}catch(err){showToast('오류','err',err.message||String(err));}}(async()=>{const {data}=await supabase.auth.getSession();if(data?.session){state.session=data.session;state.role=roleFromEmail(state.session.user.email);state.mode=state.role;render();showToast('자동 로그인','ok');}else{render();}})();</script></body></html>
