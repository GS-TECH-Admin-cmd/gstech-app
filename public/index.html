<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>GS-TECH Attendance</title>
<style>
:root{--blue:#113462;--red:#c6152d;--gold:#c59a48;--bg:#f5f7fb;--card:#fff;--shadow:0 10px 24px rgba(0,0,0,.05);}
body{margin:0;background:var(--bg);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;}
header{display:flex;gap:14px;align-items:center;padding:12px 16px;background:linear-gradient(90deg,var(--blue),#1a4d9b);color:#fff;}
header img{height:44px;pointer-events:none;user-select:none;}
header .title{margin:0;font-weight:800;font-size:15px;}
header .subtitle{margin:2px 0 0;font-size:12px;opacity:.85;}
header .grow{flex:1}
.chip{background:rgba(255,255,255,.14);padding:6px 10px;border-radius:999px;font-size:12px;}
.btn{cursor:pointer;border:0;border-radius:10px;font-weight:800;padding:10px 12px}
.btn.primary{background:#fff;color:var(--blue)}
.btn.danger{background:#fff;color:var(--red)}
.btn.ghost{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.5)}
.container{max-width:1080px;margin:18px auto;padding:0 16px;}
.grid{display:grid;gap:14px;grid-template-columns:1fr;}
@media (min-width:920px){.grid{grid-template-columns:1fr 1fr}}
.card{background:var(--card);border-radius:14px;box-shadow:var(--shadow);padding:16px}
.card h2{margin:0 0 8px;font-size:14px;}
.row{display:flex;gap:10px;flex-wrap:wrap}
.field{flex:1;min-width:150px}
label{display:block;font-size:12px;color:#475569;margin-bottom:6px}
input,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid #e2e8f0;}
textarea{min-height:80px;resize:vertical}
.list{margin:10px 0 0;padding:0;list-style:none}
.li{border:1px solid #e2e8f0;border-radius:10px;padding:10px;margin-top:10px}
.status{font-size:12px;opacity:.7;margin-left:8px}
.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:#fff;border:1px solid #e2e8f0;padding:10px 12px;border-radius:999px;box-shadow:var(--shadow)}
</style>
</head>

<body>
<header>
  <img src="/logo1.png" alt="GS-TECH">
  <div>
    <p class="title">GS-TECH Attendance</p>
    <p class="subtitle">현장 출근 · 리포트 · 승인</p>
  </div>
  <div class="grow"></div>
  <span id="user-chip" class="chip">로그인 필요</span>
  <button id="btn-logout" class="btn ghost" style="display:none">로그아웃</button>
</header>
<div class="container">
  <div class="grid">
    <div class="card">
      <h2>오늘 상태</h2>
      <p id="summary-text" style="margin:0;line-height:1.5;font-size:13px;color:#1f2937">
        로그인하면 오늘 상태가 표시됩니다.
      </p>
    </div>
    <div class="card" id="auth-card">
      <h2>로그인</h2>
      <div class="row">
        <div class="field">
          <label>Email</label>
          <input id="email" type="email" placeholder="name@company.com"/>
        </div>
        <div class="field">
          <label>Password</label>
          <input id="password" type="password" placeholder="••••••••"/>
        </div>
        <div class="field">
          <label>관리자 코드 (관리자만)</label>
          <input id="admin-code" placeholder="(선택)"/>
        </div>
      </div>
      <div class="row" style="margin-top:10px">
        <button id="signup" class="btn primary">회원가입</button>
        <button id="login" class="btn primary">로그인</button>
      </div>
    </div>
    <div class="card" id="emp-card" style="display:none">
      <h2>직원</h2>
      <div class="row">
        <div class="field"><label>작업자</label><input id="worker" placeholder="홍길동"/></div>
        <div class="field"><label>현장</label><input id="site" placeholder="ATL"/></div>
        <div class="field"><label>크루</label><input id="crew" placeholder="Team 1"/></div>
      </div>
      <div class="row" style="margin-top:10px">
        <button id="checkin" class="btn primary">출근</button>
        <button id="checkout" class="btn danger">퇴근</button>
      </div>
      <hr/>
      <div class="field">
        <label>데일리 리포트</label>
        <textarea id="notes" placeholder="금일 작업"></textarea>
      </div>
      <div class="row" style="margin-top:10px">
        <button id="report" class="btn primary">리포트 제출</button>
      </div>
    </div>
    <div class="card" id="mgr-card" style="display:none">
      <h2>관리자</h2>
      <div class="row">
        <button id="load" class="btn primary">승인 대기 불러오기</button>
      </div>
      <ul id="list" class="list"></ul>
    </div>
  </div>
</div>
<div id="toast" class="toast" style="display:none"></div>
<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
const url="https://ktkaaksftkihokgaxqtr.supabase.co";
const key="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt0a2Fha3NmdGtpaG9rZ2F4cXRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNzQ2NjYsImV4cCI6MjA5MTg1MDY2Nn0.WFMQOvyQF8eWA4aMik-NHBxKPlA_Dmv41fsPtXTQAks";
const supabase=createClient(url,key);
const ADMIN="GS-TECH-ADMIN2026";
const MANAGERS=["oh82@gstechamericallc.com","syl@gstechamericallc.com"];
const q=(id)=>document.getElementById(id);
const email=q("email"), password=q("password"), adminCode=q("admin-code");
const worker=q("worker"), site=q("site"), crew=q("crew"), notes=q("notes");
const chip=q("user-chip"), btnLogout=q("btn-logout");
const cards={auth:q("auth-card"), emp:q("emp-card"), mgr:q("mgr-card"), list:q("list"), summary:q("summary-text"), toast:q("toast")};
function showToast(msg){ cards.toast.textContent=msg; cards.toast.style.display="block"; setTimeout(()=>cards.toast.style.display="none", 1800);}
function state(role){ cards.auth.style.display=role?"none":"block"; cards.emp.style.display=role==="employee"?"block":"none"; cards.mgr.style.display=role==="manager"?"block":"none"; btnLogout.style.display=role?"inline-flex":"none"; chip.textContent=role?`로그인됨 · ${role}`:"로그인 필요"; }
function safe(val){ return (val||"").trim(); }
async function updateSummary(user){
  const {data}=await supabase.from("attendance_logs").select("status,check_out_time").eq("created_by", user.email).order("check_in_time", {ascending:false}).limit(1);
  let s="오늘 출근 기록이 없습니다.";
  const row=data && data[0];
  if(row){
    if(row.status==="approved"){ s="오늘 승인된 출근 기록이 있습니다."; }
    else if(!row.check_out_time){ s="오늘 출근 중입니다."; }
    else { s="오늘 퇴근 처리되었습니다. 승인 대기 중일 수 있습니다."; }
  }
  cards.summary.textContent=s;
}
async function render(){
  const {data:{user}}=await supabase.auth.getUser();
  if(!user){ state(""); cards.summary.textContent="로그인하면 오늘 상태가 표시됩니다."; return;}
  const role=MANAGERS.includes(user.email)?"manager":"employee";
  state(role);
  updateSummary(user);
}
q("login").onclick=async()=>{ try{ await supabase.auth.signInWithPassword({email:safe(email.value),password:password.value}); render(); showToast("로그인"); }catch(e){showToast("로그인 실패");}};
q("signup").onclick=async()=>{ try{
  const isManager=MANAGERS.includes(safe(email.value)) || safe(adminCode.value)===ADMIN;
  await supabase.auth.signUp({ email:safe(email.value), password:password.value, options:{data:{role:isManager?"manager":"employee"}}});
  showToast("회원가입 완료"); render();
}catch(e){showToast("회원가입 실패");}};
btnLogout.onclick=async()=>{await supabase.auth.signOut(); render(); showToast("로그아웃");};
q("checkin").onclick=async()=>{
  try{
    const {data:{user}}=await supabase.auth.getUser(); if(!user) throw new Error("no user");
    await supabase.from("attendance_logs").insert({ created_by:user.email, worker_name:safe(worker.value)||user.email, site_name:safe(site.value)||"default", crew_name:safe(crew.value)||"default", check_in_time:new Date().toISOString(), status:"pending" });
    showToast("출근 저장"); render();
  }catch(e){showToast("출근 실패");}
};
q("checkout").onclick=async()=>{
  try{
    const {data:{user}}=await supabase.auth.getUser(); if(!user) throw new Error("no user");
    const {data}=await supabase.from("attendance_logs").select("id,check_out_time").eq("created_by", user.email).is("check_out_time", null).order("check_in_time", {ascending:false}).limit(1);
    const row=data && data[0]; if(!row){ showToast("출근중 기록 없음"); return;}
    await supabase.from("attendance_logs").update({check_out_time:new Date().toISOString()}).eq("id", row.id);
    showToast("퇴근 저장"); render();
  }catch(e){showToast("퇴근 실패");}
};
q("report").onclick=async()=>{
  try{
    const {data:{user}}=await supabase.auth.getUser(); if(!user) throw new Error("no user");
    await supabase.from("daily_reports").insert({ created_by:user.email, worker_name:safe(worker.value)||user.email, site_name:safe(site.value)||"default", crew_name:safe(crew.value)||"default", notes:safe(notes.value)||"(내용 없음)", status:"pending" });
    showToast("리포트 제출"); render();
  }catch(e){showToast("리포트 실패");}
};
q("load").onclick=async()=>{
  try{
    cards.list.innerHTML="";
    const {data:{user}}=await supabase.auth.getUser(); if(!user) throw new Error("no user");
    if(!MANAGERS.includes(user.email)){ showToast("관리자만"); return;}
    const {data:logs}=await supabase.from("attendance_logs").select("id,worker_name,site_name,crew_name,status,check_in_time,check_out_time").eq("status","pending").order("check_in_time",{ascending:false}).limit(20);
    const {data:reports}=await supabase.from("daily_reports").select("id,worker_name,site_name,crew_name,status,notes,created_at").eq("status","pending").order("created_at",{ascending:false}).limit(20);
    const make=(kind, arr)=> (arr||[]).forEach(r=>{
      const li=document.createElement("li"); li.className="li";
      li.innerHTML=`<b>${kind}</b> · ${r.worker_name} (${r.site_name})<span class="status">${r.status}</span><div style="margin-top:6px;font-size:12px">${kind==="로그"?"출근:"+r.check_in_time+(r.check_out_time?" / 퇴근:"+r.check_out_time:"") :"노트:"+r.notes}</div><div class='row' style='margin-top:10px'><button class='btn primary'>승인</button><button class='btn danger'>반려</button></div>`;
      const [approve,reject]=li.querySelectorAll("button");
      approve.onclick=async()=>{ await supabase.from(kind==="로그"?"attendance_logs":"daily_reports").update({status:"approved"}).eq("id", r.id); showToast("승인"); q("load").click(); };
      reject.onclick=async()=>{ await supabase.from(kind==="로그"?"attendance_logs":"daily_reports").update({status:"rejected"}).eq("id", r.id); showToast("반려"); q("load").click(); };
      cards.list.appendChild(li);
    });
    make("로그", logs); make("리포트", reports);
    if(!cards.list.childElementCount){ cards.list.innerHTML="<li class='li'>승인 대기 없음</li>"; }
  }catch(e){showToast("불러오기 실패");}
};
supabase.auth.onAuthStateChange(()=>render());
render();
</script>
</body></html>
