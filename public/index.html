<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GS-TECH Attendance</title>
  <style>
    :root{--red:#d24a3b;--blue:#1e4fd3;--gray:#444;--bg:#f7f7f8}
    body{margin:0;font-family:system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial,sans-serif;background:var(--bg);color:var(--gray)}
    header{background:#fff;border-bottom:1px solid rgba(0,0,0,.08);padding:12px 18px;display:flex;align-items:center;justify-content:space-between;gap:10px;position:sticky;top:0;z-index:10}
    .brand{display:flex;align-items:center;gap:12px}
    .logo{width:48px;height:26px;border-radius:10px;border:2px solid var(--red);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
    .logo::before{content:'';position:absolute;left:0;right:0;height:3px;background:var(--blue);top:6px}
    .logo::after{content:'';position:absolute;left:0;right:0;height:3px;background:var(--blue);bottom:6px}
    .logo span{font-weight:800;color:var(--red);font-size:18px;mix-blend-mode:normal}
    .brand h1{font-size:16px;margin:0;line-height:1.1;color:#222}
    .brand p{margin:0;color:#666;font-size:12px}
    nav{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    button{border:1px solid rgba(0,0,0,.12);background:#fff;border-radius:8px;padding:8px 10px;cursor:pointer;font-weight:600;color:#333;transition:transform .1s ease, background .2s ease}
    button:hover{transform:translateY(-1px)}
    .primary{border-color:var(--blue);color:var(--blue)}
    .danger{border-color:var(--red);color:var(--red)}
    .pill{border-radius:999px;padding:7px 10px;font-size:12px;color:#555}
    .active{background:rgba(30,79,211,.08)}
    main{max-width:980px;margin:16px auto;padding:0 16px 40px}
    .grid{display:grid;grid-template-columns:1fr;gap:14px}
    @media (min-width:900px){.grid{grid-template-columns:1fr 1fr}}
    .card{background:#fff;border-radius:14px;border:1px solid rgba(0,0,0,.08);box-shadow:0 8px 24px rgba(0,0,0,.04);padding:14px}
    .card h2{margin:0 0 10px;font-size:14px;color:#222}
    label{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;font-size:13px;color:#333}
    input, textarea{padding:8px 10px;border-radius:10px;border:1px solid rgba(0,0,0,.16);font-size:13px}
    textarea{min-height:90px}
    .row{display:flex;gap:10px;flex-wrap:wrap}
    .muted{color:#777;font-size:12px}
    .list{margin-top:8px;display:flex;flex-direction:column;gap:8px}
    .row-item{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;padding:10px;border-radius:12px;border:1px solid rgba(0,0,0,.08)}
    .row-item strong{display:block}
    .toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:#111;color:#fff;padding:10px 12px;border-radius:999px;font-size:12px;opacity:0;pointer-events:none;transition:opacity .2s}
    .toast.show{opacity:1}
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <div class="logo"><span>GS</span></div>
      <div>
        <h1>GS-TECH America LLC</h1>
        <p>Attendance &amp; Daily Report</p>
      </div>
    </div>
    <nav>
      <button class="pill" data-lang="ko" id="lang-ko">한국어</button>
      <button class="pill" data-lang="en" id="lang-en">EN</button>
      <button class="pill" data-lang="es" id="lang-es">ES</button>
      <button class="pill" id="mode-employee" class="active">👷 직원</button>
      <button class="pill" id="mode-admin">🛠 관리자</button>
    </nav>
  </header>
  <main>
    <div class="grid">
      <section class="card" id="sec-employee">
        <h2 data-i18n="employeeTitle">직원 / 출근·리포트</h2>
        <div class="row">
          <label style="flex:1">
            <span data-i18n="name">이름</span>
            <input id="worker" placeholder="예: Hong Gil-dong" />
          </label>
          <label style="flex:1">
            <span data-i18n="crew">팀(crew)</span>
            <input id="crew" placeholder="예: Crew A" />
          </label>
        </div>
        <label>
          <span data-i18n="site">현장명(site)</span>
          <input id="site" placeholder="예: Site 1" />
        </label>
        <div class="row">
          <button class="primary" id="btn-checkin" data-i18n="checkIn">출근</button>
          <button class="primary" id="btn-checkout" data-i18n="checkOut">퇴근</button>
        </div>
        <p class="muted" id="geo" data-i18n="geo">GPS 위치 확인 중...</p>

        <hr />
        <h2 data-i18n="reportTitle">데일리 리포트</h2>
        <label>
          <span data-i18n="notes">리포트 내용</span>
          <textarea id="notes" placeholder="오늘 작업내용/이슈 등"></textarea>
        </label>
        <div class="row">
          <button class="primary" id="btn-report" data-i18n="submitReport">리포트 제출</button>
        </div>
      </section>

      <section class="card" id="sec-admin" style="display:none">
        <h2 data-i18n="adminTitle">관리자 / 승인 및 CSV</h2>
        <div class="row">
          <button class="primary" id="btn-load-pending" data-i18n="loadPending">승인 대기 불러오기</button>
          <button class="primary" id="btn-csv" data-i18n="downloadCsv">CSV 다운로드(출근 로그)</button>
        </div>
        <div class="list" id="pending-list"></div>
        <div class="list" id="report-list"></div>
      </section>
    </div>
  </main>
  <div class="toast" id="toast"></div>

  <script type="module">
    const SUPABASE_URL = "https://ktkaaksftkihokgaxqtr.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt0a2Fha3NmdGtpaG9rZ2F4cXRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNzQ2NjYsImV4cCI6MjA5MTg1MDY2Nn0.WFMQOvyQF8eWA4aMik-NHBxKPlA_Dmv41fsPtXTQAks";

    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const toast = (msg) => {
      const el = document.getElementById("toast");
      el.textContent = msg;
      el.classList.add("show");
      setTimeout(() => el.classList.remove("show"), 2200);
    };

    const $ = (id) => document.getElementById(id);

    const i18n = {
      ko: {
        employeeTitle: "직원 / 출근·리포트",
        name: "이름",
        crew: "팀(crew)",
        site: "현장명(site)",
        checkIn: "출근",
        checkOut: "퇴근",
        reportTitle: "데일리 리포트",
        notes: "리포트 내용",
        submitReport: "리포트 제출",
        adminTitle: "관리자 / 승인 및 CSV",
        loadPending: "승인 대기 불러오기",
        downloadCsv: "CSV 다운로드(출근 로그)",
        geo: "GPS 위치 확인 중...",
        toastMissing: "이름/현장/팀을 입력하세요",
        toastInserted: "저장되었습니다",
        toastError: "오류가 발생했습니다",
        toastNoOpen: "퇴근 처리할 출근 기록이 없습니다",
      },
      en: {
        employeeTitle: "Employee / Attendance & Report",
        name: "Name",
        crew: "Crew",
        site: "Site",
        checkIn: "Check-in",
        checkOut: "Check-out",
        reportTitle: "Daily Report",
        notes: "Notes",
        submitReport: "Submit Report",
        adminTitle: "Admin / Approvals & CSV",
        loadPending: "Load Pending",
        downloadCsv: "Download CSV (Attendance)",
        geo: "Checking GPS...",
        toastMissing: "Please fill name/site/crew",
        toastInserted: "Saved",
        toastError: "Something went wrong",
        toastNoOpen: "No open attendance found",
      },
      es: {
        employeeTitle: "Empleado / Entrada & Reporte",
        name: "Nombre",
        crew: "Equipo",
        site: "Obra",
        checkIn: "Entrada",
        checkOut: "Salida",
        reportTitle: "Reporte Diario",
        notes: "Notas",
        submitReport: "Enviar Reporte",
        adminTitle: "Admin / Aprobaciones & CSV",
        loadPending: "Cargar Pendientes",
        downloadCsv: "Descargar CSV (Asistencia)",
        geo: "Comprobando GPS...",
        toastMissing: "Complete nombre/obra/equipo",
        toastInserted: "Guardado",
        toastError: "Error",
        toastNoOpen: "No hay asistencia abierta",
      },
    };

    let lang = "ko";
    const translate = () => {
      document.querySelectorAll("[data-i18n]").forEach((el) => {
        const key = el.dataset.i18n;
        el.textContent = i18n[lang][key];
      });
    };

    const setLang = (next) => {
      lang = next;
      translate();
      ["lang-ko","lang-en","lang-es"].forEach((id) => $(id).classList.remove("active"));
      $(`lang-${next}`).classList.add("active");
      toast({ko:"언어 변경",en:"Language changed",es:"Idioma cambiado"}[lang]);
    };

    ["ko","en","es"].forEach((l) => {
      $(`lang-${l}`).onclick = () => setLang(l);
    });

    const setMode = (mode) => {
      if (mode === "admin") {
        $("sec-employee").style.display = "none";
        $("sec-admin").style.display = "block";
        $("mode-admin").classList.add("active");
        $("mode-employee").classList.remove("active");
      } else {
        $("sec-employee").style.display = "block";
        $("sec-admin").style.display = "none";
        $("mode-employee").classList.add("active");
        $("mode-admin").classList.remove("active");
      }
    };
    $("mode-employee").onclick = () => setMode("employee");
    $("mode-admin").onclick = () => setMode("admin");

    const getCommon = () => {
      const worker_name = $("worker").value.trim();
      const site_name = $("site").value.trim();
      const crew_name = $("crew").value.trim();
      if (!worker_name || !site_name || !crew_name) {
        toast(i18n[lang].toastMissing);
        return null;
      }
      return { worker_name, site_name, crew_name };
    };

    const updateGeo = () => {
      if (!navigator.geolocation) {
        $("geo").textContent = {ko:"GPS를 지원하지 않는 브라우저",en:"Geolocation not supported",es:"Sin geolocalización"}[lang];
        return;
      }
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          const { latitude, longitude } = pos.coords;
          $("geo").textContent = `${latitude.toFixed(5)}, ${longitude.toFixed(5)}`;
        },
        () => {
          $("geo").textContent = {ko:"GPS 권한이 없습니다",en:"GPS permission denied",es:"Permiso GPS denegado"}[lang];
        }
      );
    };
    updateGeo();

    $("btn-checkin").onclick = async () => {
      const c = getCommon();
      if (!c) return;
      try {
        const { error } = await supabase.from("attendance_logs").insert({
          ...c,
          check_in_time: new Date().toISOString(),
          status: "pending",
        });
        if (error) throw error;
        toast(i18n[lang].toastInserted);
      } catch (e) {
        toast(i18n[lang].toastError);
      }
    };

    $("btn-checkout").onclick = async () => {
      const c = getCommon();
      if (!c) return;
      try {
        const { data, error } = await supabase
          .from("attendance_logs")
          .select("id, check_in_time")
          .eq("worker_name", c.worker_name)
          .eq("site_name", c.site_name)
          .eq("crew_name", c.crew_name)
          .is("check_out_time", null)
          .order("check_in_time", { ascending: false })
          .limit(1);
        if (error) throw error;
        if (!data || data.length === 0) {
          toast(i18n[lang].toastNoOpen);
          return;
        }
        const id = data[0].id;
        const { error: upErr } = await supabase
          .from("attendance_logs")
          .update({ check_out_time: new Date().toISOString() })
          .eq("id", id);
        if (upErr) throw upErr;
        toast(i18n[lang].toastInserted);
      } catch (e) {
        toast(i18n[lang].toastError);
      }
    };

    $("btn-report").onclick = async () => {
      const c = getCommon();
      if (!c) return;
      const notes = $("notes").value.trim();
      if (!notes) {
        toast({ko:"리포트 내용을 입력하세요",en:"Write a report",es:"Escribe el reporte"}[lang]);
        return;
      }
      try {
        const { error } = await supabase.from("daily_reports").insert({
          ...c,
          notes,
          status: "pending",
        });
        if (error) throw error;
        $("notes").value = "";
        toast(i18n[lang].toastInserted);
      } catch (e) {
        toast(i18n[lang].toastError);
      }
    };

    const renderPending = async () => {
      try {
        const { data: logs } = await supabase
          .from("attendance_logs")
          .select("id, worker_name, crew_name, site_name, check_in_time, check_out_time, status")
          .eq("status", "pending")
          .order("check_in_time", { ascending: false })
          .limit(30);

        const { data: reports } = await supabase
          .from("daily_reports")
          .select("id, worker_name, crew_name, site_name, notes, status, created_at")
          .eq("status", "pending")
          .order("created_at", { ascending: false })
          .limit(30);

        const list = $("pending-list");
        const rlist = $("report-list");
        list.innerHTML = "";
        rlist.innerHTML = "";

        const approveText = {ko:"승인",en:"Approve",es:"Aprobar"}[lang];
        const rejectText = {ko:"반려",en:"Reject",es:"Rechazar"}[lang];

        (logs || []).forEach((row) => {
          const wrapper = document.createElement("div");
          wrapper.className = "row-item";
          wrapper.innerHTML = `<div><strong>${row.worker_name}</strong><span class=muted>${row.crew_name} · ${row.site_name}</span><span class=muted>${row.check_in_time?.slice(0,16)}${row.check_out_time ? " → "+row.check_out_time.slice(0,16):""}</span></div>`;
          const actions = document.createElement("div");
          const ok = document.createElement("button");
          ok.textContent = approveText;
          ok.className = "primary";
          ok.onclick = () => updateStatus("attendance_logs", row.id, "approved");
          const no = document.createElement("button");
          no.textContent = rejectText;
          no.className = "danger";
          no.onclick = () => updateStatus("attendance_logs", row.id, "rejected");
          actions.append(ok, no);
          wrapper.append(actions);
          list.append(wrapper);
        });

        (reports || []).forEach((row) => {
          const wrapper = document.createElement("div");
          wrapper.className = "row-item";
          wrapper.innerHTML = `<div><strong>${row.worker_name}</strong><span class=muted>${row.crew_name} · ${row.site_name}</span><span class=muted>${row.created_at?.slice(0,16)}</span><div class=muted>${row.notes}</div></div>`;
          const actions = document.createElement("div");
          const ok = document.createElement("button");
          ok.textContent = approveText;
          ok.className = "primary";
          ok.onclick = () => updateStatus("daily_reports", row.id, "approved");
          const no = document.createElement("button");
          no.textContent = rejectText;
          no.className = "danger";
          no.onclick = () => updateStatus("daily_reports", row.id, "rejected");
          actions.append(ok, no);
          wrapper.append(actions);
          rlist.append(wrapper);
        });

        toast({ko:"갱신",en:"Reloaded",es:"Actualizado"}[lang]);
      } catch (e) {
        toast(i18n[lang].toastError);
      }
    };

    const updateStatus = async (table, id, status) => {
      try {
        const { error } = await supabase.from(table).update({ status }).eq("id", id);
        if (error) throw error;
        renderPending();
      } catch (e) {
        toast(i18n[lang].toastError);
      }
    };

    $("btn-load-pending").onclick = renderPending;

    $("btn-csv").onclick = async () => {
      try {
        const { data, error } = await supabase
          .from("attendance_logs")
          .select("worker_name, crew_name, site_name, check_in_time, check_out_time, status")
          .order("check_in_time", { ascending: false })
          .limit(5000);
        if (error) throw error;

        const headers = ["worker_name","crew_name","site_name","check_in_time","check_out_time","status"];
        const rows = (data || []).map((row) => headers.map((h) => (row[h] ?? "")).join(","));
        const csv = [headers.join(","), ...rows].join("\n");

        const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `attendance_logs_${new Date().toISOString().slice(0,10)}.csv`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        toast({ko:"다운로드",en:"Downloaded",es:"Descargado"}[lang]);
      } catch (e) {
        toast(i18n[lang].toastError);
      }
    };

    // init
    setLang("ko");
  </script>
</body>
</html>
